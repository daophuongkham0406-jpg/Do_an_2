<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiệu ứng Đăng nhập & Đăng ký</title>
    <link rel="stylesheet" href="Fontend/test.css">
</head>
<body>

<div class="container" id="container">
    <div class="form-container sign-up">
        <form>
            <h1>Create Account</h1>
            <input type="text" placeholder="Name">
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <button type="button">SIGN UP</button>
        </form>
    </div>

    <div class="form-container sign-in">
        <form>
            <h1>Sign In</h1>
            <input type="email" placeholder="Email">
            <input type="password" placeholder="Password">
            <button type="button">SIGN IN</button>
        </form>
    </div>

    <div class="toggle-container">
        <div class="toggle">
            <div class="toggle-panel toggle-left">
                <h1>Welcome Back!</h1>
                <p>Để quay lại trang đăng nhập, vui lòng nhấn nút bên dưới</p>
                <button class="hidden" id="login">SIGN IN</button>
            </div>
            <div class="toggle-panel toggle-right">
                <h1>Hello, Friend!</h1>
                <p>Nhập thông tin cá nhân của bạn để đăng ký tài khoản mới</p>
                <button class="hidden" id="register">SIGN UP</button>
            </div>
        </div>
    </div>
</div>

<script>
    const container = document.getElementById('container');
    const registerBtn = document.getElementById('register');
    const loginBtn = document.getElementById('login');

    // Thêm class 'active' để kích hoạt hiệu ứng trượt sang trái (Sign Up)
    registerBtn.addEventListener('click', () => {
        container.classList.add("active");
    });

    // Xóa class 'active' để quay về trạng thái ban đầu (Sign In)
    loginBtn.addEventListener('click', () => {
        container.classList.remove("active");
    });
</script>

</body>
</html>
